<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Create React Appで作成されたWebサイト"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!--
      manifest.json は、WebアプリをスマートフォンやPCにインストールする際に使われるメタデータを提供します。
      詳しくは: https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!--
      上記のタグでは %PUBLIC_URL% を使用しています。
      これはビルド時に public フォルダのURLに置き換えられます。

      public フォルダ内のファイルのみ、このHTMLから参照できます。

      "/favicon.ico" や "favicon.ico" と違い、
      "%PUBLIC_URL%/favicon.ico" はクライアントサイドルーティングや
      ルート以外のURLでも正しく動作します。

      非ルートURLの設定方法は `npm run build` を実行して確認してください。
    -->
    <title>Reactアプリ</title>
  </head>
  <body>
    <noscript>このアプリを実行するにはJavaScriptを有効にしてください。</noscript>
    <div id="root"></div>

    <!--
      このHTMLファイルはテンプレートです。
      ブラウザで直接開いても、空白のページが表示されます。

      Webフォント、メタタグ、解析ツールなどはこのファイルに追加できます。
      ビルドすると、バンドルされたスクリプトが <body> に挿入されます。

      開発を開始するには `npm start` または `yarn start` を実行してください。
      本番用ビルドを作成するには `npm run build` または `yarn build` を実行してください。
    -->
  </body>
</html>
